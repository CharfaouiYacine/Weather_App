<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel ="icon" href="images/weather.png" type="image/x-icon">
</head>
<body style="background: linear-gradient(to right, #74ebd5, #ACB6E5);">
    <div style="text-align:center; margin-top:50px;">
        <h1>⛅ Weather App ⛅</h1>
        <input type="text" id="city" placeholder="Enter A City" style="padding:10px; font-size:16px; border-radius:8px; border:1px solid gray;">
        <button id="get" style="padding:10px 15px; font-size:16px; border-radius:8px; border:none; background:#4CAF50; color:white; cursor:pointer;">Submit</button>
        <br>
        <div id ="data"style="margin-top:20px; display:inline-block; text-align:left; padding:15px;
            border-radius:10px; background:#f5f5f5; box-shadow:0 4px 10px rgba(0,0,0,0.1);"></div>
        <script src="UI_main.js"></script>
    </div>
</body>
</html>
